<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promoções</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app" id="app-promocoes">
        <header class="topbar">
            <div class="brand">
                <span class="brand-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 12L12 20L4 12V4H12L20 12Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                        <circle cx="8.5" cy="7.5" r="1.4" fill="currentColor"/>
                    </svg>
                </span>
                <div>
                    <h1>Promoções</h1>
                    <p>Defina descontos e destaque produtos no carrossel</p>
                </div>
            </div>
            <nav class="topbar-nav">
                <a href="../estoque/index.html" id="link-estoque" class="link-loja">Estoque</a>
                <a href="../usuarios/index.html" id="link-usuarios" class="link-loja">Usuários</a>
                <a href="../loja/index.html" id="link-loja" class="link-loja">Ver loja</a>
            </nav>
        </header>

        <main class="content">
            <section class="card table-card">
                <div class="table-header">
                    <h2>Produtos</h2>
                    <div class="table-header-acoes">
                        <input type="text" id="busca-produto" class="busca-input" placeholder="Buscar por nome, tipo ou marca...">
                        <span class="badge" id="contador-produtos">0 produtos</span>
                    </div>
                </div>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Marca</th>
                                <th>No carrossel</th>
                                <th>Preço original</th>
                                <th>Promoção (%)</th>
                                <th>Preço com desconto</th>
                            </tr>
                        </thead>
                        <tbody id="lista-promocoes"></tbody>
                    </table>
                </div>

                <div class="vazio" id="vazio-promocoes" hidden>
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 7L12 3L21 7V17L12 21L3 17V7Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                        <path d="M3 7L12 11L21 7" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                        <path d="M12 11V21" stroke="currentColor" stroke-width="1.4"/>
                    </svg>
                    <p id="vazio-promocoes-texto">Nenhum produto cadastrado ainda.</p>
                </div>
            </section>
        </main>
    </div>

    <div class="acesso-negado" id="acesso-negado" hidden>
        <section class="card">
            <h2>Acesso restrito</h2>
            <p>Esta área é exclusiva para administradores.</p>
            <a href="../loja/index.html" class="btn btn-primary">Voltar para a loja</a>
        </section>
    </div>

    <div class="toast" id="toast"></div>

    <script src="script.js"></script>
</body>
</html>
