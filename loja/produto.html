<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produto - WGStore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header class="topbar">
            <div class="topbar-linha">
                <div class="brand">
                    <span class="brand-icon brand-icon-letra">W</span>
                    <div>
                        <h1>WGStore</h1>
                    </div>
                </div>

                <div class="topbar-direita">
                    <div class="conta" id="conta-deslogada">
                        <a href="../login/index.html" class="link-admin">Entrar</a>
                    </div>

                    <div class="conta-logada" id="conta-logada" hidden>
                        <button type="button" id="btn-conta-menu" class="conta-nome-btn">
                            <span id="conta-nome"></span>
                            <svg class="chevron" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                        <div class="conta-menu" id="conta-menu" hidden>
                            <a href="../estoque/index.html" id="link-estoque-menu" class="conta-menu-item" hidden>Estoque</a>
                            <a href="../usuarios/index.html" id="link-usuarios-menu" class="conta-menu-item" hidden>Usuários</a>
                            <button type="button" id="btn-sair" class="conta-menu-item conta-menu-sair">Sair</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="topbar-linha topbar-acoes">
                <a href="index.html" class="link-admin">&larr; Voltar para a loja</a>

                <button type="button" id="btn-carrinho" class="btn-carrinho">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 4H5L6.2 6M6.2 6H20L18 13H7.5M6.2 6L8.2 16H18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="9" cy="20" r="1.3" fill="currentColor"/>
                        <circle cx="17" cy="20" r="1.3" fill="currentColor"/>
                    </svg>
                    Carrinho
                    <span class="carrinho-contador" id="carrinho-contador" hidden>0</span>
                </button>
            </div>
        </header>

        <main class="content">
            <section class="card produto-detalhe" id="produto-detalhe"></section>

            <div class="vazio" id="produto-nao-encontrado" hidden>
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 7L12 3L21 7V17L12 21L3 17V7Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                    <path d="M3 7L12 11L21 7" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                    <path d="M12 11V21" stroke="currentColor" stroke-width="1.4"/>
                </svg>
                <p>Produto não encontrado. <a href="index.html">Voltar para a loja</a>.</p>
            </div>
        </main>
    </div>

    <div class="overlay" id="overlay"></div>

    <aside class="carrinho-drawer" id="carrinho-drawer">
        <div class="carrinho-header">
            <h2>Seu carrinho</h2>
            <button type="button" id="btn-fechar-carrinho" class="btn-fechar" aria-label="Fechar carrinho">&times;</button>
        </div>

        <div class="carrinho-itens" id="carrinho-itens"></div>

        <div class="carrinho-vazio" id="carrinho-vazio">
            <p>Seu carrinho está vazio.</p>
        </div>

        <div class="carrinho-footer">
            <div class="carrinho-total">
                <span>Total</span>
                <span id="carrinho-total-valor">R$ 0,00</span>
            </div>
            <button type="button" id="btn-finalizar" class="btn btn-primary" disabled>Finalizar compra</button>
        </div>
    </aside>

    <div class="toast" id="toast"></div>

    <script src="produto.js"></script>
</body>
</html>
