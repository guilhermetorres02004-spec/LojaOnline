<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WGStore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../shared/chat-suporte.css">
</head>
<body>
    <div class="app">
        <header class="topbar">
            <div class="topbar-linha">
                <div class="brand">
                    <span class="brand-icon brand-icon-letra">W</span>
                    <div>
                        <h1>WGStore</h1>
                    </div>
                </div>

                <div class="topbar-direita">
                    <div class="conta-logada" id="conta-logada">
                        <button type="button" id="btn-conta-menu" class="conta-nome-btn">
                            <span id="conta-nome">Minha conta</span>
                            <span class="carrinho-contador" id="carrinho-contador" hidden>0</span>
                            <svg class="chevron" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                        <div class="conta-menu" id="conta-menu" hidden>
                            <button type="button" id="btn-abrir-carrinho" class="conta-menu-item">Carrinho</button>
                            <a href="minha-conta.html" id="link-minha-conta-menu" class="conta-menu-item" hidden>Minha conta</a>
                            <a href="../login/index.html" id="link-entrar-menu" class="conta-menu-item">Entrar</a>
                            <a href="../estoque/index.html" id="link-estoque-menu" class="conta-menu-item" hidden>Estoque</a>
                            <a href="../usuarios/index.html" id="link-usuarios-menu" class="conta-menu-item" hidden>Usuários</a>
                            <a href="../descontos/index.html" id="link-descontos-menu" class="conta-menu-item" hidden>Descontos</a>
                            <a href="../promocoes/index.html" id="link-promocoes-menu" class="conta-menu-item" hidden>Promoções</a>
                            <a href="../cadastros/index.html" id="link-cadastros-menu" class="conta-menu-item" hidden>Cadastros</a>
                            <a href="../suporte/index.html" id="link-suporte-menu" class="conta-menu-item" hidden>Suporte</a>
                            <button type="button" id="btn-sair" class="conta-menu-item conta-menu-sair" hidden>Sair</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="topbar-linha topbar-acoes">
                <div class="busca">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.6"/>
                        <path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                    </svg>
                    <input type="text" id="busca-produto" placeholder="Buscar produtos...">
                </div>
            </div>
        </header>

        <main class="content">
            <section class="carrossel">
                <div class="carrossel-viewport">
                    <div class="carrossel-inner">
                        <div class="carrossel-trilho" id="carrossel-trilho"></div>

                        <button type="button" class="carrossel-seta carrossel-anterior" id="carrossel-anterior" aria-label="Imagem anterior">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M15 6L9 12L15 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                        <button type="button" class="carrossel-seta carrossel-proxima" id="carrossel-proxima" aria-label="Próxima imagem">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M9 6L15 12L9 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>

                        <div class="carrossel-indicadores" id="carrossel-indicadores"></div>
                    </div>
                </div>
            </section>

            <div class="loja-corpo">
                <aside class="filtros-loja">
                    <div class="filtro-grupo">
                        <div class="filtro-cabecalho">
                            <h3>Filtros</h3>
                            <button type="button" id="btn-limpar-filtros" class="link-limpar">Limpar</button>
                        </div>
                    </div>

                    <div class="filtro-grupo">
                        <h3>Preço</h3>
                        <div class="filtro-preco">
                            <input type="number" id="filtro-preco-min" min="0" placeholder="Mín">
                            <span>até</span>
                            <input type="number" id="filtro-preco-max" min="0" placeholder="Máx">
                        </div>
                    </div>

                    <div class="filtro-grupo">
                        <h3>Categoria</h3>
                        <div id="filtro-tipos" class="filtro-lista"></div>
                    </div>

                    <div class="filtro-grupo">
                        <h3>Marca</h3>
                        <div id="filtro-marcas" class="filtro-lista"></div>
                    </div>

                    <div class="filtro-grupo">
                        <label class="filtro-checkbox">
                            <input type="checkbox" id="filtro-em-estoque">
                            Somente em estoque
                        </label>
                        <label class="filtro-checkbox">
                            <input type="checkbox" id="filtro-promocao">
                            Somente em promoção
                        </label>
                    </div>
                </aside>

                <div class="loja-produtos">
                    <section class="grid-produtos" id="grid-produtos"></section>

                    <div class="vazio" id="vazio-loja" hidden>
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M3 7L12 3L21 7V17L12 21L3 17V7Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                            <path d="M3 7L12 11L21 7" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                            <path d="M12 11V21" stroke="currentColor" stroke-width="1.4"/>
                        </svg>
                        <p id="vazio-loja-texto">Nenhum produto disponível no momento.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="overlay" id="overlay"></div>

    <aside class="carrinho-drawer" id="carrinho-drawer">
        <div class="carrinho-header">
            <h2>Seu carrinho</h2>
            <button type="button" id="btn-fechar-carrinho" class="btn-fechar" aria-label="Fechar carrinho">&times;</button>
        </div>

        <div class="carrinho-itens" id="carrinho-itens"></div>

        <div class="carrinho-vazio" id="carrinho-vazio">
            <p>Seu carrinho está vazio.</p>
        </div>

        <div class="carrinho-footer">
            <div class="carrinho-total">
                <span>Total</span>
                <span id="carrinho-total-valor">R$ 0,00</span>
            </div>
            <button type="button" id="btn-finalizar" class="btn btn-primary" disabled>Finalizar compra</button>
        </div>
    </aside>

    <div class="toast" id="toast"></div>

    <script src="script.js"></script>
    <script src="../shared/chat-suporte.js"></script>
</body>
</html>
