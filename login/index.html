<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar ou criar conta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <a href="../loja/index.html" class="link-loja">&larr; Voltar para a loja</a>

        <section class="card auth-card">
            <div class="brand">
                <span class="brand-icon brand-icon-letra">W</span>
                <div>
                    <h1>WGStore</h1>
                    <p>Acesse sua conta ou crie uma nova</p>
                </div>
            </div>

            <div class="abas">
                <button type="button" class="aba ativa" id="aba-entrar" data-aba="entrar">Entrar</button>
                <button type="button" class="aba" id="aba-cadastrar" data-aba="cadastrar">Criar conta</button>
                <button type="button" class="aba" id="aba-empresa" data-aba="empresa">Sou uma empresa</button>
            </div>

            <p class="mensagem" id="mensagem" hidden></p>

            <form id="form-entrar" class="form-auth" novalidate>
                <div class="campo">
                    <label for="entrar-email">E-mail</label>
                    <input type="email" id="entrar-email" placeholder="voce@email.com" required>
                </div>

                <div class="campo">
                    <label for="entrar-senha">Senha</label>
                    <input type="password" id="entrar-senha" placeholder="Sua senha" required>
                </div>

                <button type="submit" class="btn btn-primary">Entrar</button>
                <a href="esqueci-senha.html" class="link-esqueci-senha">Esqueci minha senha</a>
            </form>

            <form id="form-cadastrar" class="form-auth" hidden novalidate>
                <div class="campo">
                    <label for="cadastro-nome">Nome</label>
                    <input type="text" id="cadastro-nome" placeholder="Seu nome" required>
                </div>

                <div class="campo">
                    <label for="cadastro-email">E-mail</label>
                    <input type="email" id="cadastro-email" placeholder="voce@email.com" required>
                </div>

                <div class="campo">
                    <label for="cadastro-cpf">CPF</label>
                    <input type="text" id="cadastro-cpf" placeholder="000.000.000-00" inputmode="numeric" maxlength="14" required>
                    <p class="ajuda">Usamos para identificar suas compras e enviar promoções exclusivas.</p>
                </div>

                <div class="campo">
                    <label for="cadastro-senha">Senha</label>
                    <input type="password" id="cadastro-senha" placeholder="Crie uma senha" minlength="4" required>
                </div>

                <div class="campo">
                    <label for="cadastro-confirmar">Confirmar senha</label>
                    <input type="password" id="cadastro-confirmar" placeholder="Repita a senha" minlength="4" required>
                </div>

                <button type="submit" class="btn btn-primary">Criar conta</button>
            </form>

            <form id="form-empresa" class="form-auth" hidden autocomplete="off" novalidate>
                <div class="campo">
                    <label for="empresa-nome">Nome da empresa</label>
                    <input type="text" id="empresa-nome" placeholder="Ex: WG Periféricos Ltda" autocomplete="off" required>
                </div>

                <div class="campo">
                    <label for="empresa-cnpj">CNPJ</label>
                    <input type="text" id="empresa-cnpj" placeholder="00.000.000/0000-00" inputmode="numeric" maxlength="18" autocomplete="off" required>
                </div>

                <div class="campo">
                    <label for="empresa-email">E-mail de contato</label>
                    <input type="email" id="empresa-email" placeholder="contato@empresa.com" autocomplete="off" required>
                </div>

                <div class="campo">
                    <label for="empresa-telefone">Número de contato</label>
                    <input type="text" id="empresa-telefone" placeholder="(00) 00000-0000" inputmode="numeric" maxlength="15" autocomplete="off" required>
                </div>

                <div class="campo">
                    <label for="empresa-senha">Senha</label>
                    <input type="password" id="empresa-senha" placeholder="Crie uma senha" minlength="4" autocomplete="new-password" required>
                </div>

                <div class="campo">
                    <label for="empresa-confirmar">Confirmar senha</label>
                    <input type="password" id="empresa-confirmar" placeholder="Repita a senha" minlength="4" autocomplete="new-password" required>
                </div>

                <p class="ajuda">Seu cadastro será analisado pelo administrador. Você só conseguirá entrar depois que ele for aprovado.</p>

                <button type="submit" class="btn btn-primary">Enviar cadastro</button>
            </form>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
